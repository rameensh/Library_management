services:
  postgres:
    image: postgres:16-alpine
    container_name: bibliotheca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bibliotheca
    ports:
      - "5432:5432"
    volumes:
      - bibliotheca_pgdata:/var/lib/postgresql/data

volumes:
  bibliotheca_pgdata:
